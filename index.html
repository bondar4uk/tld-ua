<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TLD Mods UA — Українські переклади модів для The Long Dark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:'#090b0e', bg2:'#0d1117', bg3:'#131a22',
            card:'#0f1620',
            border:'#1c2a3a', borderg:'#254060',
            gold:'#f0c040', goldd:'#c09020',
            ice:'#7ecfee', iced:'#4899c0',
            ttext:'#cdd8e8', tdim:'#6a84a0', tmuted:'#3a526a',
            tgreen:'#50c880', tred:'#e04060',
          },
          fontFamily: {
            display:['Bebas Neue','sans-serif'],
            body:['Inter','sans-serif'],
            mono:['JetBrains Mono','monospace'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    body { font-family:'Inter',sans-serif; background:#090b0e; color:#cdd8e8; display:flex; flex-direction:column; height:100vh; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.018;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

    #preloader { position:fixed; inset:0; background:#090b0e; z-index:9999; transition:opacity .7s ease; }

    #mainScroll { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-gutter:stable; min-width:0; }
    #mainScroll::-webkit-scrollbar { width:8px; }
    #mainScroll::-webkit-scrollbar-track { background:#0d1117; }
    #mainScroll::-webkit-scrollbar-thumb { background:linear-gradient(180deg,#254060,#4899c0); border-radius:4px; border:2px solid #0d1117; }
    #mainScroll::-webkit-scrollbar-thumb:hover { background:linear-gradient(180deg,#4899c0,#7ecfee); }

    .snowflake { position:absolute; top:-12px; color:rgba(126,207,238,.2); animation:fall linear infinite; user-select:none; }
    @keyframes fall { to { transform:translateY(230px); opacity:0; } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .35s ease both; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation:spin .75s linear infinite; }

    /* ── MODALS ── */
    .modal-backdrop {
      position:fixed; inset:0; z-index:9000;
      background:rgba(9,11,14,0); backdrop-filter:blur(0px);
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      transition:background .25s ease, backdrop-filter .25s ease;
    }
    .modal-backdrop.open { background:rgba(9,11,14,.88); backdrop-filter:blur(10px); pointer-events:auto; }
    .modal-box {
      background:#0f1620; border:1px solid #254060; border-radius:14px;
      width:100%; margin:16px; box-shadow:0 24px 64px rgba(0,0,0,.8);
      transform:translateY(20px) scale(.97); opacity:0;
      transition:transform .28s cubic-bezier(.16,1,.3,1), opacity .22s ease;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .modal-backdrop.open .modal-box { transform:translateY(0) scale(1); opacity:1; }

    .dl-bar { transform:translateY(100%); transition:transform .3s cubic-bezier(.16,1,.3,1); }
    .dl-bar.visible { transform:translateY(0); }

    /* ── CARD ── */
    .card-sel { box-shadow:0 0 0 1px #f0c040, inset 0 0 40px rgba(240,192,64,.04); }
    .clamp2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-img { opacity:0; transition:opacity .4s ease; }
    .card-img.loaded { opacity:1; }
    /* horizontal scroll rows — no wrap, hidden scrollbar */
    .hscroll { display:flex; flex-wrap:nowrap; gap:4px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; align-items:center; }
    .hscroll::-webkit-scrollbar { display:none; }
    .aspect-16-9 { position:relative; width:100%; padding-top:56.25%; overflow:hidden; }
    .aspect-16-9 img, .aspect-16-9 .ph { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .ph { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
      background:linear-gradient(135deg,#0c1720 0%,#0f2030 50%,#1a2f44 100%); }
    .ph::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 60%,rgba(126,207,238,.05) 0%,transparent 65%); }
    .ph-name { font-family:'Bebas Neue',sans-serif; letter-spacing:2px; color:rgba(205,216,232,.55); text-align:center; padding:0 12px; font-size:clamp(13px,2.5vw,20px); line-height:1.2; position:relative; z-index:1; }
    .ph-cats { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; color:rgba(78,153,192,.4); text-transform:uppercase; position:relative; z-index:1; }

    /* ── SIDEBAR ── */
    #sidebar { width:200px; flex-shrink:0; border-right:1px solid #1c2a3a; display:flex; flex-direction:column; overflow:hidden; }
    @media(max-width:900px){ #sidebar{display:none} #mobileFilterToggle{display:flex!important} }
    #mobileFilterToggle { display:none; }
    .sb-section { border-bottom:1px solid #1c2a3a; padding:10px 12px; }
    .sb-title { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:3px; color:#3a526a; text-transform:uppercase; margin-bottom:7px; }

    .ftag { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:4px; border:1px solid #1c2a3a; background:#131a22; color:#6a84a0; font-size:11px; cursor:pointer; transition:all .12s; user-select:none; line-height:1.4; }
    .ftag:hover { border-color:#254060; color:#cdd8e8; }
    .ftag.on-cat    { background:#254060; border-color:#4899c0; color:#7ecfee; }
    .ftag.on-author { background:#1a2b3e; border-color:#4899c0; color:#7ecfee; }
    .ftag.on-type   { background:#1e2f40; border-color:#4899c0; color:#7ecfee; }

    .status-btn { width:30px; height:30px; border-radius:5px; border:1px solid #1c2a3a; background:#131a22; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .12s; font-size:14px; line-height:1; }
    .status-btn:hover { border-color:#254060; transform:scale(1.1); }
    .status-btn.on-working    { background:rgba(80,200,128,.15);  border-color:#50c880; box-shadow:0 0 6px rgba(80,200,128,.3); }
    .status-btn.on-issues     { background:rgba(232,192,96,.12);  border-color:#e8c060; box-shadow:0 0 6px rgba(232,192,96,.3); }
    .status-btn.on-notupdated { background:rgba(74,153,192,.12);  border-color:#4899c0; box-shadow:0 0 6px rgba(74,153,192,.3); }
    .status-btn.on-notworking { background:rgba(224,64,96,.12);   border-color:#e04060; box-shadow:0 0 6px rgba(224,64,96,.3); }
    .status-btn.on-noinfo     { background:rgba(58,82,106,.2);    border-color:#6a84a0; }

    .sort-btn { padding:4px 9px; border-radius:4px; border:1px solid #1c2a3a; background:transparent; color:#6a84a0; font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; transition:all .12s; white-space:nowrap; display:flex; align-items:center; gap:3px; }
    .sort-btn:hover { border-color:#254060; color:#cdd8e8; }
    .sort-btn.active { background:#131a22; border-color:#4899c0; color:#7ecfee; }
    .sort-btn.active .sort-arrow { color:#f0c040; }

    #tooltip { position:fixed; background:#0f1620; border:1px solid #254060; border-radius:6px; padding:5px 10px; font-size:11.5px; color:#cdd8e8; pointer-events:none; z-index:10000; opacity:0; transition:opacity .12s ease; white-space:nowrap; max-width:280px; box-shadow:0 4px 16px rgba(0,0,0,.5); transform:translateX(-50%); }
    #tooltip.show { opacity:1; }

    #backTop { position:fixed; bottom:76px; right:20px; z-index:500; width:34px; height:34px; border-radius:8px; background:#131a22; border:1px solid #254060; color:#4899c0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; opacity:0; pointer-events:none; }
    #backTop.show { opacity:1; pointer-events:auto; }
    #backTop:hover { background:#1a2f44; border-color:#4899c0; color:#7ecfee; transform:translateY(-2px); }

    .mfbtn { padding:4px 10px; border-radius:4px; border:1px solid #1c2a3a; background:#131a22; color:#6a84a0; font-size:12px; cursor:pointer; transition:all .12s; }
    .mfbtn:hover { border-color:#254060; color:#cdd8e8; }
    .mfbtn.active { background:#4899c0; border-color:#7ecfee; color:#fff; }
    .mfbtn[data-filter="translated"].active { background:#005BBB; border-color:#FFD500; color:#FFD500; }

    .sdot-working    { background:#50c880; box-shadow:0 0 4px #50c880; }
    .sdot-issues     { background:#e8c060; box-shadow:0 0 4px #e8c060; }
    .sdot-notupdated { background:#4899c0; box-shadow:0 0 4px #4899c0; }
    .sdot-notworking { background:#e04060; box-shadow:0 0 4px #e04060; }
    .sdot-noinfo     { background:#3a526a; }

    .card-cb { position:absolute; top:8px; right:8px; z-index:10; width:20px; height:20px; border-radius:4px; border:1.5px solid #254060; background:#0d1117; display:flex; align-items:center; justify-content:center; transition:background .15s, border-color .15s; }
    .card-cb.checked { background:#f0c040; border-color:#f0c040; }

    .stat-item { font-family:'JetBrains Mono',monospace; font-size:10px; color:#3a526a; display:flex; align-items:center; gap:3px; white-space:nowrap; }

    /* ── DOWNLOAD FILE ROW ── */
    .dl-file-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; border:1px solid #1c2a3a; background:#131a22; transition:all .15s; cursor:pointer; text-decoration:none; }
    .dl-file-row:hover { border-color:#4899c0; background:#0d1820; }
    .dl-file-row.done { border-color:rgba(80,200,128,.35); background:rgba(80,200,128,.05); }
    .dl-check { width:18px; height:18px; border-radius:4px; border:1.5px solid #254060; background:#090b0e; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .dl-file-row.done .dl-check { background:#50c880; border-color:#50c880; }

    .mod-group { border-bottom:1px solid rgba(28,42,58,.7); padding-bottom:14px; margin-bottom:14px; }
    .mod-group:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }

    input:focus, select:focus { outline:none; }
    #authorChips { scrollbar-width:none; -ms-overflow-style:none; }
    #authorChips::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>

<div id="preloader"></div>
<div id="tooltip"></div>
<button id="backTop" aria-label="На початок">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- SINGLE MOD MODAL -->
<div id="singleModal" class="modal-backdrop">
  <div class="modal-box" style="max-width:400px">
    <div class="px-5 py-4 border-b border-border flex items-center justify-between gap-3 flex-shrink-0">
      <div>
        <p id="singleModalTitle" class="font-display text-xl text-white tracking-widest leading-none"></p>
        <p class="font-mono text-[10px] text-tmuted mt-0.5">Оберіть файли для завантаження</p>
      </div>
      <button onclick="closeModal('singleModal')" class="w-7 h-7 flex items-center justify-center rounded border border-border text-tmuted hover:text-tred hover:border-tred transition-all cursor-pointer bg-transparent flex-shrink-0">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="singleModalFiles" class="px-5 py-4 flex flex-col gap-2 overflow-y-auto" style="max-height:60vh"></div>
  </div>
</div>

<!-- BATCH DOWNLOAD MODAL -->
<div id="batchModal" class="modal-backdrop">
  <div class="modal-box" style="max-width:520px; max-height:90vh">
    <div class="px-5 py-4 border-b border-border flex-shrink-0 flex items-start justify-between gap-3">
      <div>
        <p class="font-display text-2xl text-gold tracking-widest leading-none">СПИСОК ЗАВАНТАЖЕНЬ</p>
        <p id="batchSubtitle" class="font-mono text-[10px] text-tdim mt-1"></p>
      </div>
      <button onclick="closeModal('batchModal')" class="w-7 h-7 flex items-center justify-center rounded border border-border text-tmuted hover:text-tred hover:border-tred transition-all cursor-pointer bg-transparent flex-shrink-0 mt-0.5">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="batchModalBody" class="px-5 py-4 overflow-y-auto flex-1"></div>
    <div class="px-5 py-3 border-t border-border flex-shrink-0 flex items-center justify-between gap-3">
      <p id="batchProgress" class="font-mono text-[11px] text-tdim"></p>
      <button onclick="closeModal('batchModal')" class="px-4 py-1.5 text-xs text-tmuted border border-border rounded transition-all hover:border-tred hover:text-tred cursor-pointer bg-transparent font-mono">ЗАКРИТИ</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div id="headerBlock" class="relative z-[60] flex-shrink-0" style="background:rgba(9,11,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid #1c2a3a">
  <header class="relative border-b border-border overflow-hidden">
    <div class="absolute inset-0 pointer-events-none overflow-hidden" id="snowflakes"></div>
    <div class="relative flex items-center justify-center py-2 px-4">
      <h1 class="font-display text-white leading-none select-none" style="font-size:26px;letter-spacing:5px;text-shadow:0 0 30px rgba(126,207,238,.1)">
        TLD <span class="text-gold" style="text-shadow:0 0 20px rgba(240,192,64,.35)">MODS</span> UA
      </h1>
      <div class="absolute right-4 inline-flex rounded overflow-hidden border border-border opacity-60">
        <span class="block w-8 h-1" style="background:#005BBB"></span>
        <span class="block w-8 h-1" style="background:#FFD500"></span>
      </div>
    </div>
  </header>

  <div class="px-3 py-2 flex items-center gap-2 flex-wrap border-b border-border" style="border-color:rgba(28,42,58,.6)">
    <div class="relative flex-1 min-w-[160px]">
      <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 text-tmuted pointer-events-none" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" autocomplete="off" placeholder="Пошук за назвою, автором…" class="w-full bg-bg3 border border-border rounded py-1.5 pl-8 pr-3 text-sm text-ttext placeholder-tmuted transition-colors focus:border-iced" style="outline:none">
    </div>
    <div class="flex gap-1" id="filterWrap">
      <button class="mfbtn active" data-filter="all">Усі</button>
      <button class="mfbtn" data-filter="translated">🇺🇦 Перекладені</button>
    </div>
    <button class="mfbtn items-center gap-1.5" id="mobileFilterToggle" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Фільтри
      <span id="mobileFilterCount" class="hidden font-mono text-[9px] bg-gold text-bg px-1 rounded-sm">0</span>
    </button>
    <button id="deselectBtn" class="px-3 py-1.5 rounded border border-border bg-transparent text-tdim text-xs cursor-pointer transition-all hover:border-goldd hover:text-gold font-mono">Скинути вибір</button>
  </div>

  <div class="px-3 py-1.5 flex items-center gap-2 flex-wrap">
    <div class="flex items-center gap-1 flex-wrap" id="sortBtns">
      <span class="font-mono text-[9px] text-tmuted mr-1 tracking-widest">СОРТ:</span>
      <button class="sort-btn" data-field="updated" data-dir="desc">Оновлення<span class="sort-arrow">↓</span></button>
      <button class="sort-btn" data-field="trans"   data-dir="desc">Переклад<span class="sort-arrow">↓</span></button>
      <button class="sort-btn" data-field="name"    data-dir="asc">Назва<span class="sort-arrow">А→Я</span></button>
      <button class="sort-btn" data-field="author"  data-dir="asc">Автор<span class="sort-arrow">А→Я</span></button>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-3">
      <div class="stat-item">Показано: <strong id="sVisible" class="text-ice">0</strong></div>
      <div class="stat-item">Перекладено: <strong id="sTranslated" class="text-gold">0</strong></div>
      <div class="stat-item">Вибрано: <strong id="sSelected" class="text-tgreen">0</strong></div>
    </div>
  </div>
</div>

<!-- CONTENT ROW -->
<div class="flex flex-1 overflow-hidden relative z-10">
  <aside id="sidebar">
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="sb-section">
        <p class="sb-title">Категорії</p>
        <div id="catChips" class="flex flex-wrap gap-1"></div>
      </div>
      <div class="sb-section">
        <p class="sb-title">Статус</p>
            <div class="flex gap-1.5 flex-wrap">
            <button class="status-btn" data-status="working" data-tip="Працює">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="status-btn" data-status="issues" data-tip="З проблемами">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </button>
            <button class="status-btn" data-status="notupdated" data-tip="Не оновлено">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </button>
            <button class="status-btn" data-status="notworking" data-tip="Не працює">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="status-btn" data-status="noinfo" data-tip="Без інфо">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>
            </div>
      </div>
      <div class="sb-section">
        <p class="sb-title">Тип</p>
        <div id="typeChips" class="flex flex-wrap gap-1"></div>
      </div>
      <div class="sb-section flex-1 overflow-hidden flex flex-col" style="min-height:0">
        <p class="sb-title">Автор</p>
        <div class="relative mb-2 flex-shrink-0">
          <svg class="absolute left-2 top-1/2 -translate-y-1/2 text-tmuted pointer-events-none" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="authorQ" type="text" placeholder="Пошук…" autocomplete="off" class="w-full bg-bg3 border border-border rounded py-1 pl-6 pr-2 text-[11px] text-ttext placeholder-tmuted focus:border-iced transition-colors" style="outline:none">
        </div>
        <div id="authorChips" class="flex flex-col gap-0.5 overflow-y-auto flex-1" style="min-height:0"></div>
      </div>
      <div class="px-3 py-2 flex-shrink-0">
        <button id="resetFiltersBtn" class="w-full py-1.5 text-[11px] text-tmuted hover:text-tred transition-colors cursor-pointer border-0 bg-transparent font-mono">Скинути всі фільтри</button>
      </div>
    </div>
  </aside>

  <main id="mainScroll">
    <div id="content" class="px-4 pt-4 pb-24">
      <div class="flex flex-col items-center justify-center py-24 gap-4 text-tmuted">
        <div class="w-10 h-10 rounded-full border-2 border-border border-t-iced spin"></div>
        <span class="text-sm">Завантаження списку модів…</span>
      </div>
    </div>
  </main>
</div>

<!-- DOWNLOAD BAR -->
<div id="dlBar" class="dl-bar fixed bottom-0 left-0 right-0 z-[200] border-t border-border px-4 py-2.5 flex items-center gap-3" style="background:rgba(9,11,14,.98);backdrop-filter:blur(20px)">
  <p class="flex-1 text-sm text-tdim whitespace-nowrap">
    Вибрано: <strong id="dlCount" class="font-mono text-gold">0 модів</strong>
  </p>
  <div id="chips" class="flex gap-1.5 flex-wrap overflow-hidden max-h-7 max-w-[40%]"></div>
  <button id="dlBtn" class="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-gold text-bg font-display text-lg tracking-widest cursor-pointer border-0 whitespace-nowrap transition-all hover:bg-[#ffd060] hover:-translate-y-px active:translate-y-0" style="letter-spacing:2px">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    ЗАВАНТАЖИТИ
  </button>
</div>

<script>
const CACHE_URL = './mods-cache.json';
const TRANS_URL = './translations.json';
const LS_KEY    = 'tld-ua-selected-v1';

let allMods = [], translations = {}, catMap = {}, currentGameVer = '2.51', imgManifest = {};
let selected = new Set(lsLoad());
let activeFilter = 'all', activeCats = new Set(), activeAuthors = new Set(), activeStatuses = new Set(), activeTypes = new Set();
let sortBy = 'updated-desc', searchQ = '', authorQ = '';
const dlDone = new Set(); // tracks clicked downloads: "modName|url"

function lsLoad() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
function lsSave()  { try { localStorage.setItem(LS_KEY, JSON.stringify([...selected])); } catch {} }

function dismissPreloader() {
  const el = document.getElementById('preloader');
  if (!el) return;
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 750); }, 80);
}

// TOOLTIP
let _ttTimer;
const _ttEl = document.getElementById('tooltip');
function showTip(target) {
  clearTimeout(_ttTimer);
  _ttEl.textContent = target.dataset.tip;
  _ttEl.className = '';
  requestAnimationFrame(() => {
    const r = target.getBoundingClientRect();
    const tw = _ttEl.offsetWidth || 120, th = _ttEl.offsetHeight || 28;
    let top = r.top - th - 8;
    const below = top < 4;
    if (below) top = r.bottom + 8;
    let left = r.left + r.width / 2;
    left = Math.max(tw/2+8, Math.min(left, window.innerWidth - tw/2 - 8));
    _ttEl.style.left = left + 'px';
    _ttEl.style.top  = top  + 'px';
    _ttEl.classList.add(below ? 'tip-below' : 'tip-above', 'show');
  });
}
function hideTip() { clearTimeout(_ttTimer); _ttTimer = setTimeout(() => { _ttEl.className = ''; }, 80); }
document.addEventListener('mouseover', e => { const t = e.target.closest('[data-tip]'); if (t) showTip(t); });
document.addEventListener('mouseout',  e => { if (e.target.closest('[data-tip]')) hideTip(); });
document.addEventListener('scroll', () => { _ttEl.className = ''; }, true);

// BACK TO TOP
const _btt = document.getElementById('backTop');
const _ms  = document.getElementById('mainScroll');
_ms.addEventListener('scroll', () => { _btt.classList.toggle('show', _ms.scrollTop > 600); }, {passive:true});
_btt.addEventListener('click', () => _ms.scrollTo({top:0,behavior:'smooth'}));

// MODAL
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  // Clear download progress when closing
  dlDone.clear();
  document.querySelectorAll('.dl-file-row.done').forEach(r=>{
    r.classList.remove('done');
    const chk=r.querySelector('.dl-check'); if(chk) chk.innerHTML='';
  });
}

// Ukrainian plurals
function pluralMod(n) {
  const abs=Math.abs(n), mod10=abs%10, mod100=abs%100;
  if (mod100>=11&&mod100<=14) return `${n} модів`;
  if (mod10===1) return `${n} мод`;
  if (mod10>=2&&mod10<=4) return `${n} моди`;
  return `${n} модів`;
}
function pluralFile(n) {
  const abs=Math.abs(n), mod10=abs%10, mod100=abs%100;
  if (mod100>=11&&mod100<=14) return `${n} файлів`;
  if (mod10===1) return `${n} файл`;
  if (mod10>=2&&mod10<=4) return `${n} файли`;
  return `${n} файлів`;
}
function pluralDep(n) {
  const abs=Math.abs(n), mod10=abs%10, mod100=abs%100;
  if (mod100>=11&&mod100<=14) return `${n} залежн.`;
  if (mod10===1) return `${n} залежн.`;
  if (mod10>=2&&mod10<=4) return `${n} залежн.`;
  return `${n} залежн.`;
}

['singleModal','batchModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(id); });
});
function semverGte(v1, v2) {
  const p1 = String(v1||'').split('.').map(Number), p2 = String(v2||'').split('.').map(Number);
  for (let i = 0; i < Math.max(p1.length, p2.length); i++) { const a=p1[i]||0, b=p2[i]||0; if(a>b)return true; if(a<b)return false; }
  return true;
}
function isTestedOnCurrent(mod) {
  const tld = mod.TestedOn?.tld; if (!tld) return false;
  return (Array.isArray(tld)?tld:[tld]).some(v => semverGte(v, currentGameVer));
}
function getStatus(mod) {
  const s = mod.Status; if (!s) return 'noinfo';
  if (s.working===false) return 'notworking';
  if (s.issues && String(s.issues).replace(/<[^>]*>/g,'').trim()) return 'issues';
  if (!isTestedOnCurrent(mod)) return 'notupdated';
  if (s.working===true) return 'working';
  return 'noinfo';
}
const STATUS_META = {
  working:   {label:'Працює',       dot:'sdot-working',    icon:'✅'},
  issues:    {label:'З проблемами', dot:'sdot-issues',     icon:'⚠️'},
  notupdated:{label:'Не оновлено',  dot:'sdot-notupdated', icon:'🕐'},
  notworking:{label:'Не працює',    dot:'sdot-notworking', icon:'❌'},
  noinfo:    {label:'Без інфо',     dot:'sdot-noinfo',     icon:'❓'},
};

// HELPERS
function tName(mod) { return translations[mod.Name]?.displayName || mod.DisplayName || mod.Name; }
function tDesc(mod) { return translations[mod.Name]?.description  || mod.Description || ''; }
function tCats(mod) { return (mod.Categories||[]).map(c => catMap[c]||c); }
function imgSrc(mod){ return imgManifest[mod.Name] || mod.Images?.[0] || null; }
function esc(s)     { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uniq(arr)  { return [...new Set(arr)]; }
function getFileExt(fname) { const m = fname.match(/\.([^.]+)$/); return m ? m[1].toUpperCase() : ''; }
function isFileUrl(url)    { return /\.(zip|7z|dll|modcomponent)(\?.*)?$/i.test(url); }
function isTagUrl(url)     { return /\/releases\/tag\//i.test(url); }
// Extract version from tag URL: .../tag/v1.2.3 → "v1.2.3"
function tagVersion(url)   { const m=url.match(/\/releases\/tag\/([^/?]+)/i); return m?m[1]:''; }

// Returns links for a mod: { links:[{url,isFile,isTag,label,version}], isTranslation, noTranslation }
function getModLinks(mod) {
  const trans = translations[mod.Name];
  if (trans?.noTranslation) return { links:[], isTranslation:false, noTranslation:true };
  if (trans?.files?.length) {
    return { links: uniq(trans.files).map(url => ({ url, isFile:isFileUrl(url), isTag:false, label:url.split('/').pop().split('?')[0], version:'' })), isTranslation:true, noTranslation:false };
  }
  const raw = mod.Downloads || (mod.Download ? [mod.Download] : []);
  // deduplicate by normalized URL (trim + lowercase)
  const seen = new Set();
  const deduped = raw.filter(u => { const k=u.trim().toLowerCase(); if(seen.has(k))return false; seen.add(k);return true; });
  const allLinks = deduped.map(url => ({ url, isFile:isFileUrl(url), isTag:isTagUrl(url), label:url.split('/').pop().split('?')[0]||url, version:tagVersion(url) }));
  // If there are real files AND tag links — drop the tag links
  const hasFiles = allLinks.some(l => l.isFile);
  const links = hasFiles ? allLinks.filter(l => l.isFile) : allLinks;
  return { links, isTranslation:false, noTranslation:false };
}

function resolveDeps(names, visited=new Set()) {
  const result = [];
  for (const n of names) {
    if (visited.has(n)) continue; visited.add(n);
    const d = allMods.find(m => m.Name===n);
    if (d) { result.push(d); result.push(...resolveDeps(d.Dependencies||[], visited)); }
  }
  return result;
}

// INIT
async function init() {
  spawnSnow();
  setActiveSortBtn('updated-desc');
  try {
    const [modsRaw, transRaw, manifestRaw] = await Promise.all([localFetch(CACHE_URL), localFetch(TRANS_URL), localFetch('./images-cache/manifest.json')]);
    if (!Array.isArray(modsRaw)) throw new Error('no-cache');
    const td       = transRaw || {};
    translations   = td.mods        || {};
    catMap         = td.categoryMap  || {};
    currentGameVer = td.gameVersion  || '2.51';
    imgManifest    = manifestRaw     || {};
    allMods        = modsRaw.filter(m => m.Type !== undefined);
    for (const n of [...selected]) if (!allMods.find(m => m.Name===n)) selected.delete(n);
    buildSidebar();
    render();
    dismissPreloader();
  } catch(e) {
    dismissPreloader();
    document.getElementById('content').innerHTML = e.message==='no-cache'
      ? `<div class="max-w-md mx-auto text-center py-16 px-4"><p class="text-2xl mb-3">⚙️</p><p class="text-ttext font-medium mb-2">Потрібне перше налаштування</p><p class="text-sm text-tdim mb-4">Файл <code class="text-gold bg-bg3 px-1.5 py-0.5 rounded text-xs">mods-cache.json</code> ще не створено.</p><ol class="text-sm text-tdim text-left space-y-1.5 list-decimal list-inside"><li>Відкрий репозиторій на GitHub</li><li>Вкладка <strong class="text-ttext">Actions</strong></li><li><strong class="text-ttext">«Оновлення списку модів»</strong></li><li><strong class="text-gold">Run workflow</strong></li><li>Зачекай ~30 сек, онови сторінку</li></ol></div>`
      : `<div class="text-center py-16 text-tred text-sm">⚠ ${esc(e.message)}</div>`;
  }
}
async function localFetch(url) { try { const r = await fetch(url+'?_='+Date.now()); return r.ok ? r.json() : null; } catch { return null; } }

// SIDEBAR
function buildSidebar() {
  const cats = [...new Set(allMods.flatMap(m => tCats(m)))].sort((a,b) => a.localeCompare(b,'uk'));
  const catWrap = document.getElementById('catChips');
  cats.forEach(cat => {
    const b = document.createElement('button'); b.className='ftag'; b.textContent=cat; b.dataset.cat=cat;
    b.addEventListener('click', () => { activeCats.has(cat)?activeCats.delete(cat):activeCats.add(cat); b.classList.toggle('on-cat',activeCats.has(cat)); syncBadge();render(); });
    catWrap.appendChild(b);
  });
  const typeLabels = {mod:'Мод',plugin:'Плагін',lib:'Бібліотека'};
  const types = [...new Set(allMods.map(m=>m.Type).filter(Boolean))].sort();
  const typeWrap = document.getElementById('typeChips');
  types.forEach(type => {
    const b = document.createElement('button'); b.className='ftag'; b.textContent=typeLabels[type]||type; b.dataset.type=type;
    b.addEventListener('click', () => { activeTypes.has(type)?activeTypes.delete(type):activeTypes.add(type); b.classList.toggle('on-type',activeTypes.has(type)); syncBadge();render(); });
    typeWrap.appendChild(b);
  });
  document.querySelectorAll('.status-btn').forEach(b => {
    b.addEventListener('click', () => { const s=b.dataset.status; activeStatuses.has(s)?activeStatuses.delete(s):activeStatuses.add(s); b.classList.toggle(`on-${s}`,activeStatuses.has(s)); syncBadge();render(); });
  });
  renderAuthorChips();
}

function renderAuthorChips() {
  const q = authorQ.toLowerCase();
  const authors = [...new Set(allMods.map(m=>m.Author).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const list = q ? authors.filter(a=>a.toLowerCase().includes(q)) : authors;
  const wrap = document.getElementById('authorChips'); wrap.innerHTML='';
  list.forEach(a => {
    const b = document.createElement('button'); b.className='ftag w-full text-left'; b.textContent=a;
    if (activeAuthors.has(a)) b.classList.add('on-author');
    b.addEventListener('click', () => { activeAuthors.has(a)?activeAuthors.delete(a):activeAuthors.add(a); b.classList.toggle('on-author',activeAuthors.has(a)); syncBadge();render(); });
    wrap.appendChild(b);
  });
}

function syncBadge() {
  const n = activeCats.size+activeAuthors.size+activeStatuses.size+activeTypes.size;
  const badge = document.getElementById('mobileFilterCount');
  badge.textContent=n; badge.classList.toggle('hidden',n===0);
}

// SORT
const SORT_ARROWS = {updated:{asc:'↑',desc:'↓'},trans:{asc:'↑',desc:'↓'},name:{asc:'А→Я',desc:'Я→А'},author:{asc:'А→Я',desc:'Я→А'}};
function setActiveSortBtn(val) {
  const [field,dir] = val.split('-');
  document.querySelectorAll('.sort-btn').forEach(b => {
    const active = b.dataset.field===field; b.classList.toggle('active',active);
    if (active) { b.dataset.dir=dir; const a=b.querySelector('.sort-arrow'); if(a) a.textContent=SORT_ARROWS[field]?.[dir]||(dir==='asc'?'↑':'↓'); }
  });
}

// LIST
function getList() {
  let mods = allMods;
  if (activeFilter==='translated') mods=mods.filter(m=>translations[m.Name]);
  if (activeCats.size)     mods=mods.filter(m=>tCats(m).some(c=>activeCats.has(c)));
  if (activeAuthors.size)  mods=mods.filter(m=>activeAuthors.has(m.Author));
  if (activeStatuses.size) mods=mods.filter(m=>activeStatuses.has(getStatus(m)));
  if (activeTypes.size)    mods=mods.filter(m=>activeTypes.has(m.Type));
  if (searchQ) { const q=searchQ.toLowerCase(); mods=mods.filter(m=>tName(m).toLowerCase().includes(q)||tDesc(m).toLowerCase().includes(q)||(m.Author||'').toLowerCase().includes(q)||tCats(m).some(c=>c.toLowerCase().includes(q))); }
  mods=[...mods];
  const [field,dir]=sortBy.split('-'); const asc=dir==='asc';
  mods.sort((a,b) => {
    if (field==='name') return asc?tName(a).localeCompare(tName(b),'uk'):tName(b).localeCompare(tName(a),'uk');
    let va,vb;
    if (field==='author')  { va=(a.Author||'').toLowerCase(); vb=(b.Author||'').toLowerCase(); }
    if (field==='updated') { va=a.Updated||'0'; vb=b.Updated||'0'; }
    if (field==='trans')   { va=translations[a.Name]?(a.Updated||'0'):'0'; vb=translations[b.Name]?(b.Updated||'0'):'0'; }
    return asc?(va<vb?-1:va>vb?1:0):(vb<va?-1:vb>va?1:0);
  });
  return mods;
}

// RENDER
function render() {
  const list = getList();
  document.getElementById('sVisible').textContent    = list.length;
  document.getElementById('sTranslated').textContent = allMods.filter(m=>translations[m.Name]).length;
  document.getElementById('sSelected').textContent   = selected.size;
  // update bar count plural
  updateBar();
  const cnt = document.getElementById('content');
  cnt.querySelectorAll('img.card-img').forEach(i=>{i.onerror=null;i.src='';});
  cnt.innerHTML='';
  if (!list.length) { cnt.innerHTML=`<div class="text-center py-16 text-tmuted text-sm">Нічого не знайдено</div>`; updateBar(); return; }
  const grid = document.createElement('div');
  grid.className='grid gap-3';
  grid.style.gridTemplateColumns='repeat(auto-fill,minmax(280px,1fr))';
  list.forEach((mod,i) => { const c=makeCard(mod); c.style.animationDelay=Math.min(i*18,260)+'ms'; grid.appendChild(c); });
  cnt.appendChild(grid);
  observeLazy();
}

// CARD
function makeCard(mod) {
  const isSel  = selected.has(mod.Name);
  const trans  = translations[mod.Name];
  const status = getStatus(mod);
  const sm     = STATUS_META[status];
  const url    = imgSrc(mod);
  const deps   = mod.Dependencies || [];
  const testedVer = mod.TestedOn?.tld || null;
  const testedOk  = isTestedOnCurrent(mod);
  const { links, isTranslation, noTranslation } = getModLinks(mod);

  const wrap = document.createElement('div');
  wrap.className = 'fade-up relative flex flex-col rounded-lg overflow-hidden cursor-pointer border transition-all duration-150'
    +(isSel?' border-gold card-sel':' border-border hover:border-borderg hover:-translate-y-0.5 hover:shadow-[0_6px_24px_rgba(0,0,0,.5)]');
  wrap.style.background='#0f1620'; wrap.dataset.name=mod.Name;

  const cbSvg = isSel ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#090b0e" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>` : '';

  const uaBadge = isTranslation ? `<div class="absolute top-2 left-2 z-10 font-mono text-[8px] font-semibold text-white rounded px-1.5 py-0.5 select-none" style="background:linear-gradient(to bottom,#005BBB 50%,#FFD500 50%);box-shadow:0 1px 6px rgba(0,0,0,.5)">🇺🇦 UA</div>` : '';

  // status badge for image overlay (bottom-left)
  const statusBadgeColors = {
    working:    'background:rgba(10,20,14,.8);border-color:rgba(80,200,128,.5);color:#50c880',
    issues:     'background:rgba(20,16,8,.8);border-color:rgba(232,192,96,.5);color:#e8c060',
    notupdated: 'background:rgba(8,14,22,.8);border-color:rgba(74,153,192,.5);color:#7ecfee',
    notworking: 'background:rgba(20,8,12,.8);border-color:rgba(224,64,96,.5);color:#e04060',
    noinfo:     'background:rgba(10,14,18,.8);border-color:rgba(58,82,106,.4);color:#6a84a0',
  };
  const statusBadge = `<div class="absolute bottom-2 left-2 z-10 font-mono text-[9px] font-medium rounded px-1.5 py-0.5 select-none flex items-center gap-1 border" style="${statusBadgeColors[status]};backdrop-filter:blur(6px)">${sm.icon} ${sm.label}</div>`;

  // image with overlays
  let imgHtml = url
    ? `<div class="aspect-16-9">${uaBadge}${statusBadge}<img data-src="${url}" alt="${esc(tName(mod))}" decoding="async" class="card-img w-full h-full object-cover" onerror="this.onerror=null;this.src='';this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="ph" style="display:none"><p class="ph-name">${esc(tName(mod))}</p><p class="ph-cats">${tCats(mod).slice(0,2).join(' · ')}</p></div></div>`
    : `<div class="aspect-16-9">${uaBadge}${statusBadge}<div class="ph"><p class="ph-name">${esc(tName(mod))}</p><p class="ph-cats">${tCats(mod).slice(0,2).join(' · ')}</p></div></div>`;

  const cats = tCats(mod).map(c => {
    const on = activeCats.has(c);
    return `<span class="font-mono text-[9px] px-1.5 py-px rounded border cursor-pointer select-none transition-all shrink-0" style="${on?'background:#254060;border-color:#4899c0;color:#7ecfee':'background:rgba(74,153,192,.06);border-color:rgba(74,153,192,.15);color:#4899c0'}" onclick="event.stopPropagation();quickCat('${esc(c)}')">${esc(c)}</span>`;
  }).join('');

  const modVerBadge = `<span class="font-mono text-[9px] px-1.5 py-px rounded shrink-0" style="background:rgba(80,200,128,.1);border:1px solid rgba(80,200,128,.2);color:#50c880">v${esc(mod.Version||'?')}</span>`;
  const testedBadge = testedVer ? `<span class="font-mono text-[9px] px-1.5 py-px rounded shrink-0" data-tip="${testedOk?'Протестовано на поточній версії гри':'Не тестовано на v'+currentGameVer}" style="${testedOk?'background:rgba(80,200,128,.07);border:1px solid rgba(80,200,128,.15);color:#50c880':'background:rgba(74,153,192,.07);border:1px solid rgba(74,153,192,.15);color:#4899c0'}">TLD ${esc(String(testedVer))}${!testedOk?' ⚠':''}</span>` : '';
  const updDate = mod.Updated ? `<span class="font-mono text-[9px] text-tmuted shrink-0">${mod.Updated}</span>` : '';

  let transHtml = noTranslation
    ? `<span class="font-mono text-[9px] px-1.5 py-px rounded" style="background:rgba(80,200,128,.07);border:1px solid rgba(80,200,128,.15);color:#50c880" data-tip="Цей мод не потребує перекладу">✓ Переклад не потрібен</span>`
    : isTranslation && trans?.translatedVersion
      ? `<span class="font-mono text-[9px] px-1.5 py-px rounded" style="background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.2);color:#c09020" data-tip="Версія українського перекладу">🇺🇦 v${esc(trans.translatedVersion)}</span>`
      : `<span class="font-mono text-[9px] text-tmuted">Перекладу немає</span>`;

  let depsHtml = deps.length
    ? `<div class="hscroll"><span class="font-mono text-[9px] text-tmuted shrink-0">Залежності:</span>${deps.map(d=>{const dm=allMods.find(m=>m.Name===d);return`<span class="font-mono text-[9px] px-1.5 py-px rounded border shrink-0" style="background:rgba(74,153,192,.04);border-color:rgba(74,153,192,.12);color:#4899c0" data-tip="${esc(d)}">${esc(dm?tName(dm):d)}</span>`;}).join('')}</div>`
    : `<div class="flex items-center gap-1"><span class="font-mono text-[9px] text-tmuted shrink-0">Залежності:</span><span class="font-mono text-[9px] text-tmuted">Відсутні</span></div>`;

  const ghLink = mod.ModUrl ? `<a href="${mod.ModUrl}" target="_blank" onclick="event.stopPropagation()" data-tip="GitHub мода" class="w-7 h-7 flex items-center justify-center rounded border border-border bg-bg3 text-tmuted transition-all hover:border-iced hover:text-ice"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a>` : '';

  // DL button — detect if all links are tags
  let dlBtnHtml = '';
  if (links.length > 0) {
    const allTags  = links.every(l => l.isTag);
    const multiple = links.length > 1;
    const col = isTranslation
      ? {b:'rgba(240,192,64,.3)',bg:'rgba(240,192,64,.08)',t:'#c09020',hb:'rgba(240,192,64,.18)',ht:'#f0c040',hbr:'#f0c040'}
      : {b:'rgba(80,200,128,.25)',bg:'rgba(80,200,128,.07)',t:'#50c880',hb:'rgba(80,200,128,.14)',ht:'#50c880',hbr:'#50c880'};
    const tip = isTranslation ? 'Завантажити переклад'
              : allTags       ? 'Перейти на сторінку релізу'
              : multiple      ? 'Кілька файлів — оберіть'
              :                 'Завантажити файл';
    // icon: external link for tags, list for multiple files, download for single file
    const icon = allTags
      ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`
      : multiple
      ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`
      : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    dlBtnHtml = `<button onclick="event.stopPropagation();handleCardDownload('${esc(mod.Name)}')" data-tip="${tip}"
      class="w-7 h-7 flex items-center justify-center rounded border transition-all"
      style="border-color:${col.b};background:${col.bg};color:${col.t}"
      onmouseover="this.style.borderColor='${col.hbr}';this.style.background='${col.hb}';this.style.color='${col.ht}'"
      onmouseout="this.style.borderColor='${col.b}';this.style.background='${col.bg}';this.style.color='${col.t}'"
    >${icon}</button>`;
  } else if (mod.ModUrl) {
    dlBtnHtml = `<a href="${mod.ModUrl}" target="_blank" onclick="event.stopPropagation()" data-tip="Сторінка мода" class="w-7 h-7 flex items-center justify-center rounded border border-border bg-bg3 text-tmuted transition-all hover:border-iced hover:text-ice"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
  }

  wrap.innerHTML = `
    <div class="card-cb${isSel?' checked':''}" data-cb>${cbSvg}</div>
    ${imgHtml}
    <div class="flex flex-col flex-1 p-3 gap-2">
      <div class="hscroll">${cats}</div>
      <div>
        <h2 class="font-display text-[17px] text-white leading-tight" style="letter-spacing:1px">${esc(tName(mod))}</h2>
        <p class="text-[11px] text-tmuted mt-0.5"><a href="${mod.AuthorUrl||'#'}" target="_blank" onclick="event.stopPropagation()" class="text-iced hover:text-ice transition-colors">${esc(mod.Author||'')}</a></p>
      </div>
      <p class="clamp2 text-[12px] text-tdim leading-relaxed flex-1">${esc(tDesc(mod)||'Опис відсутній')}</p>
      <div class="flex flex-col gap-1 border-t border-border pt-2">
        <div class="flex items-center gap-1">${transHtml}</div>
        ${depsHtml}
      </div>
      <div class="flex items-end justify-between gap-1.5 border-t border-border pt-2 mt-auto">
        <div class="flex flex-col gap-1 min-w-0">
          <div class="hscroll">${modVerBadge}<div class="w-1.5 h-1.5 rounded-full shrink-0 ${sm.dot}"></div>${updDate}</div>
          <div class="hscroll">${testedBadge}</div>
        </div>
        <div class="flex gap-1 shrink-0">${ghLink}${dlBtnHtml}</div>
      </div>
    </div>`;

  wrap.addEventListener('click', () => toggle(mod.Name));
  return wrap;
}

function quickCat(cat) {
  activeCats.has(cat)?activeCats.delete(cat):activeCats.add(cat);
  document.querySelectorAll(`[data-cat="${CSS.escape(cat)}"]`).forEach(b=>b.classList.toggle('on-cat',activeCats.has(cat)));
  syncBadge(); render();
}

// SINGLE MOD DOWNLOAD MODAL
function handleCardDownload(modName) {
  const mod = allMods.find(m => m.Name===modName); if (!mod) return;
  const { links } = getModLinks(mod);
  if (!links.length) return;
  if (links.length===1) { window.open(links[0].url,'_blank'); return; }
  document.getElementById('singleModalTitle').textContent = tName(mod);
  const container = document.getElementById('singleModalFiles');
  container.innerHTML='';
  links.forEach(({url,label,isTag,version}) => {
    const key = modName+'|'+url;
    const row = makeDlRow(label, url, key, ()=>updateBatchProgress(), {isTag,version});
    container.appendChild(row);
  });
  openModal('singleModal');
}

function makeDlRow(label, url, key, onDone, opts={}) {
  const done  = dlDone.has(key);
  const isTag = opts.isTag    || false;
  const ver   = opts.version  || '';
  const row = document.createElement('a');
  row.href=url; row.target='_blank';
  row.className = 'dl-file-row' + (done?' done':'');
  const displayLabel = isTag ? 'Перейдіть за посиланням і скачайте потрібний файл' : esc(label);
  const subLabel     = isTag && ver ? esc(ver) : (isTag ? esc(url.slice(0,52)+(url.length>52?'…':'')) : (getFileExt(label)||'LINK'));
  row.innerHTML = `
    <div class="dl-check">${done?checkSvg():''}</div>
    <div class="flex-1 min-w-0">
      <p class="font-mono text-xs text-ttext truncate">${displayLabel}</p>
      <p class="font-mono text-[9px] text-tmuted mt-0.5">${subLabel}</p>
    </div>
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4899c0" stroke-width="2" class="shrink-0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  row.addEventListener('click', () => {
    dlDone.add(key);
    row.classList.add('done');
    row.querySelector('.dl-check').innerHTML = checkSvg();
    if (onDone) onDone();
  });
  return row;
}

function checkSvg() { return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`; }

// LAZY IMAGES
const _lazyObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const img = e.target; if (!img.dataset.src) return;
    img.src=img.dataset.src; delete img.dataset.src;
    img.addEventListener('load',  ()=>img.classList.add('loaded'),{once:true});
    img.addEventListener('error', ()=>img.classList.add('loaded'),{once:true});
    _lazyObs.unobserve(img);
  });
},{root:document.getElementById('mainScroll'),rootMargin:'250px'});
function observeLazy() { document.querySelectorAll('img.card-img[data-src]').forEach(img=>_lazyObs.observe(img)); }

// TOGGLE + AUTO-DEPS
function toggle(name) {
  const mod = allMods.find(m=>m.Name===name); if (!mod) return;
  const willSelect = !selected.has(name);
  if (willSelect) {
    selected.add(name);
    resolveDeps(mod.Dependencies||[]).forEach(dep => selected.add(dep.Name));
  } else {
    selected.delete(name);
  }
  lsSave();
  // refresh all affected card visuals
  for (const n of [...selected, name]) updateCardVisual(n);
  updateBar();
  document.getElementById('sSelected').textContent = selected.size;
}
// helper to sync sSelected after any change
function syncSelected() { document.getElementById('sSelected').textContent = selected.size; }

function updateCardVisual(name) {
  const card = document.querySelector(`[data-name="${CSS.escape(name)}"]`); if (!card) return;
  const on = selected.has(name);
  if (on) { card.classList.remove('border-border','hover:border-borderg'); card.classList.add('border-gold','card-sel'); }
  else    { card.classList.remove('border-gold','card-sel'); card.classList.add('border-border','hover:border-borderg'); }
  const cb = card.querySelector('[data-cb]');
  if (cb) { cb.classList.toggle('checked',on); cb.innerHTML=on?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#090b0e" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`:''; }
}

// BOTTOM BAR
function updateBar() {
  const n = selected.size;
  document.getElementById('dlCount').textContent=pluralMod(n);
  document.getElementById('dlBar').classList.toggle('visible',n>0);
  const chips = document.getElementById('chips'); chips.innerHTML='';
  [...selected].slice(0,4).forEach(name => {
    const mod = allMods.find(m=>m.Name===name); if (!mod) return;
    const ch = document.createElement('div');
    ch.className='flex items-center gap-1 text-[11px] text-tdim bg-bg3 border border-border rounded px-2 py-0.5 whitespace-nowrap cursor-pointer hover:border-goldd hover:text-gold transition-all';
    ch.title='Прибрати вибір';
    ch.textContent=tName(mod);
    ch.addEventListener('click', e=>{ e.stopPropagation(); toggle(name); });
    chips.appendChild(ch);
  });
  if (n>4) { const ch=document.createElement('div'); ch.className='text-[11px] text-tdim bg-bg3 border border-border rounded px-2 py-0.5'; ch.textContent=`+${n-4} ще`; chips.appendChild(ch); }
}

// BATCH MODAL
document.getElementById('dlBtn').addEventListener('click', openBatchModal);

function openBatchModal() {
  if (!selected.size) return;

  const selMods = allMods.filter(m=>selected.has(m.Name));
  const depSet  = new Set(), extraDeps = [];
  for (const mod of selMods) {
    for (const dep of resolveDeps(mod.Dependencies||[])) {
      if (!selected.has(dep.Name) && !depSet.has(dep.Name)) { depSet.add(dep.Name); extraDeps.push(dep); }
    }
  }
  const allToList = [...selMods, ...extraDeps];

  let totalLinks = 0;
  allToList.forEach(m => {
    const { links, noTranslation } = getModLinks(m);
    if (!noTranslation) totalLinks += links.length || (m.ModUrl ? 1 : 0);
  });

  document.getElementById('batchSubtitle').textContent =
    `${pluralMod(selMods.length)}${extraDeps.length?' + '+pluralDep(extraDeps.length):''} · ${pluralFile(totalLinks)}`;

  const body = document.getElementById('batchModalBody'); body.innerHTML='';

  allToList.forEach(mod => {
    const { links, isTranslation, noTranslation } = getModLinks(mod);
    const isDep = extraDeps.includes(mod);

    const group = document.createElement('div'); group.className='mod-group';

    // Header
    const header = document.createElement('div'); header.className='flex items-center gap-2 mb-2';
    header.innerHTML=`
      <div class="flex-1 min-w-0">
        <p class="font-display text-[15px] text-white leading-none" style="letter-spacing:.5px">${esc(tName(mod))}</p>
        <p class="font-mono text-[9px] text-tmuted mt-0.5">${esc(mod.Author||'')}${isDep?' · <span style="color:#4899c0">залежність</span>':''}</p>
      </div>
      ${isTranslation?`<span class="font-mono text-[8px] px-1.5 py-0.5 rounded" style="background:linear-gradient(to bottom,#005BBB 50%,#FFD500 50%);color:white">🇺🇦 UA</span>`:''}`;
    group.appendChild(header);

    if (noTranslation) {
      const p = document.createElement('p'); p.className='font-mono text-[10px] text-tgreen italic pl-1'; p.textContent='✓ Переклад не потрібен'; group.appendChild(p);
    } else if (!links.length) {
      if (mod.ModUrl) {
        const key = mod.Name+'|'+mod.ModUrl;
        const row = makeDlRow('Відкрити сторінку мода', mod.ModUrl, key, updateBatchProgress);
        // override label line 2
        const sub = row.querySelector('p.font-mono.text-\\[9px\\]');
        if (sub) sub.textContent = mod.ModUrl.slice(0,48)+(mod.ModUrl.length>48?'…':'');
        group.appendChild(row);
      } else {
        const p = document.createElement('p'); p.className='font-mono text-[10px] text-tmuted italic pl-1'; p.textContent='Файли недоступні'; group.appendChild(p);
      }
    } else {
      links.forEach(({url,label,isTag,version}) => {
        const key = mod.Name+'|'+url;
        const row = makeDlRow(label, url, key, updateBatchProgress, {isTag,version});
        group.appendChild(row);
      });
    }

    body.appendChild(group);
  });

  updateBatchProgress();
  openModal('batchModal');
}

function updateBatchProgress() {
  const rows = document.querySelectorAll('#batchModalBody .dl-file-row');
  const done = [...rows].filter(r=>r.classList.contains('done')).length;
  document.getElementById('batchProgress').textContent = rows.length>0 ? `Завантажено: ${done} / ${rows.length}` : '';
}
let st, ast;
document.getElementById('search').addEventListener('input', e => { clearTimeout(st); st=setTimeout(()=>{searchQ=e.target.value.trim();render();},180); });
document.getElementById('filterWrap').addEventListener('click', e => { const b=e.target.closest('.mfbtn'); if(!b)return; document.querySelectorAll('.mfbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeFilter=b.dataset.filter; render(); });
document.getElementById('sortBtns').addEventListener('click', e => { const b=e.target.closest('.sort-btn'); if(!b)return; const field=b.dataset.field; const[cf,cd]=sortBy.split('-'); const nd=field===cf?(cd==='asc'?'desc':'asc'):b.dataset.dir; sortBy=field+'-'+nd; setActiveSortBtn(sortBy);render(); });
document.getElementById('authorQ').addEventListener('input', e => { clearTimeout(ast); ast=setTimeout(()=>{authorQ=e.target.value.trim();renderAuthorChips();},150); });
document.getElementById('resetFiltersBtn').addEventListener('click', () => { activeCats.clear();activeAuthors.clear();activeStatuses.clear();activeTypes.clear(); document.querySelectorAll('.ftag').forEach(b=>b.className=b.className.replace(/on-\S*/g,'').trim()); document.querySelectorAll('.status-btn').forEach(b=>b.className=b.className.replace(/on-\S*/g,'').trim()); syncBadge();render(); });
document.getElementById('deselectBtn').addEventListener('click', () => { selected.clear();lsSave();render(); });
const _sidebar=document.getElementById('sidebar');
document.getElementById('mobileFilterToggle').addEventListener('click', ()=>{ _sidebar.style.display=_sidebar.style.display==='flex'?'none':'flex'; });

// SNOWFLAKES
function spawnSnow() {
  const c=document.getElementById('snowflakes');
  '❄❅❆✦✧'.split('').forEach(s=>{ for(let i=0;i<3;i++){const el=document.createElement('span');el.className='snowflake';el.textContent=s;el.style.cssText=`left:${Math.random()*100}%;font-size:${7+Math.random()*7}px;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*8}s;opacity:${0.08+Math.random()*0.18}`;c.appendChild(el);} });
}

init();
</script>
