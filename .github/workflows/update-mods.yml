name: Оновлення списку модів

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Завантажити список модів з API
        run: |
          curl -fsSL \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            "https://tldmods.com/api.json?details" \
            -o mods-cache.json
          echo "Завантажено $(jq length mods-cache.json) модів"

      - name: Кешувати картинки модів
        run: |
          mkdir -p images-cache
          jq -r '.[].Images[]? // empty' mods-cache.json | while read url; do
            fname=$(echo "$url" | md5sum | cut -d' ' -f1).${url##*.}
            [ ! -f "images-cache/$fname" ] && curl -fsSL "$url" -o "images-cache/$fname" 2>/dev/null || true
          done

      - name: Зберегти в репозиторій (якщо змінився)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mods-cache.json
          if git diff --staged --quiet; then
            echo "Список модів не змінився, пропускаємо коміт"
          else
            git commit -m "chore: оновлення списку модів $(date -u +%Y-%m-%d)"
            git push
          fi
